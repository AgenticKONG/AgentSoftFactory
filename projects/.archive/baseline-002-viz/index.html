<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* CSS Styles */
        chart-container {
            max-width: 500px;
            margin: 40px auto;
        }
        .bar {
            background-color: rgb(34, 139, 34);
            color: white;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="chart-container" id="chartContainer"></div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        // JavaScript Code
        function loadData() {
            // Load and parse data from a JSON file
            return JSON.parse(`{
                "data": [
                    {"name": "USA", "value": 120},
                    {"name": "Canada", "value": 100},
                    {"name": "Mexico", "value": 80}
                ]
            }`);
        }

        function setupChart(data) {
            // Set up the chart data and dimensions
            const margin = { top: 20, right: 20, bottom: 30, left: 40 };
            const width = 500 - margin.left - margin.right;
            const height = 300 - margin.top - margin.bottom;

            const x = d3.scaleBand()
                .domain(data.map(d => d.name))
                .range([0, width])
                .padding(0.2);

            const y = d3.scaleLinear()
                .domain([0, d3.max(data, d => d.value)])
                .range([height, 0]);

            return {
                margin,
                width,
                height,
                x,
                y
            };
        }

        function renderChart(data) {
            // Render the chart
            const chartData = setupChart(data);
            const svg = d3.select("#chartContainer")
                .append("svg")
                .attr("width", chartData.width + chartData.margin.left + chartData.margin.right)
                .attr("height", chartData.height + chartData.margin.top + chartData.margin.bottom);

            const bars = svg.selectAll("rect")
                .data(data)
                .enter()
                .append("rect")
                .attr("x1", (d, i) => chartData.x(i))
                .attr("y1", (d, i) => chartData.y(data[i].value))
                .attr("x2", (d, i) => chartData.x(i) + chartData.x.bandwidth())
                .attr("y2", (d, i) => chartData.y(data[i].value) + chartData.y.bandwidth())
                .attr("fill", "rgb(34, 139, 34)")
                .attr("class", "bar");

            const tooltips = svg.selectAll("li")
                .data(data)
                .enter()
                .append("li")
                .attr("class", "tooltip")
                .style("display", "none");

            return {
                bars,
                tooltips,
                chartData
            };
        }

        function drawChart() {
            const data = loadData();
            const { bars, tooltips, chartData } = renderChart(data);
            bars.on("mouseover", (event, d) => {
                const tooltip = event.target.parentNode;
                const mousePosition = event.clientX - chartData.margin.left;
                const dataPosition = data.findIndex(d => d.name == d.name);

                tooltips[0].style("display", "block");
                tooltips[0].style("top", (mousePosition - chartData.x(d.name)) + "px");
                tooltips[0].style("left", (mousePosition - chartData.y(d.value)) + "px");
                tooltips[0].style("background-color", "white");
                tooltips[0].style("border-radius", "10px");
                tooltips[0].style("font-size", "16px");
                tooltips[0].textContent = `${d.name}: ${d.value}`;
            });

            bars.on("mouseout", (event, d) => {
                const tooltip = event.target.parentNode;
                tooltip.style("display", "none");
            });

            tooltips[0].addEventListener("mouseover", (event, d) => tooltip(event, d));

            return bars;
        }

        function tooltip(event, data) {
            // Show the tooltip
            const mousePosition = event.clientX - data.margin.left;
            const dataPosition = data.findIndex(d => d.name == data.name);

            document.querySelector(".tooltip").style("top", (mousePosition - data.x(data.name)) + "px");
            document.querySelector(".tooltip").style("left", (mousePosition - data.y(data.value)) + "px");
            document.querySelector(".tooltip").style("background-color", "white");
            document.querySelector(".tooltip").style("border-radius", "10px");
            document.querySelector(".tooltip").style("font-size", "16px");
            document.querySelector(".tooltip").textContent = `${data.name}: ${data.value}`;
        }

        drawChart();
    </script>
</body>
</html>
